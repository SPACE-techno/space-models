<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgendaPro — Sistema de Agendamentos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <style>
        :root {
            --bg-base: #0a0f1a;
            --bg-sidebar: #111827;
            --bg-card: #1a2235;
            --bg-input: #1e293b;
            --accent-blue: #38bdf8;
            --accent-green: #34d399;
            --accent-orange: #fbbf24;
            --accent-pink: #f472b6;
            --accent-purple: #a78bfa;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #1e293b;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.4);
            --radius: 12px;
            --radius-lg: 18px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; font-size:16px; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background: var(--bg-sidebar); }
        ::-webkit-scrollbar-thumb { background: var(--accent-blue); border-radius:10px; }
        a { color:inherit; text-decoration:none; }

        /* SIDEBAR */
        .sidebar {
            width: 260px; background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 2rem;
            position: fixed; top:0; left:0; bottom:0; z-index:100;
            transition: transform 0.3s ease;
        }
        .sidebar-brand {
            font-family: 'Space Grotesk', sans-serif; font-weight: 700;
            font-size: 1.4rem; color: #fff; display: flex; align-items: center;
            gap: 0.5rem; padding: 0 0.5rem;
        }
        .sidebar-brand i { color: var(--accent-blue); font-size: 1.5rem; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 0.3rem; }
        .sidebar-nav a {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.7rem 0.75rem; border-radius: var(--radius);
            color: var(--text-secondary); font-weight: 500; font-size: 0.9rem;
            transition: all var(--transition);
        }
        .sidebar-nav a:hover, .sidebar-nav a.active {
            background: rgba(56,189,248,0.12); color: #fff;
        }
        .sidebar-nav a.active::before {
            content: ''; position: absolute; left: -4px; top: 50%;
            transform: translateY(-50%); width: 4px; height: 24px;
            background: var(--accent-blue); border-radius: 2px;
        }
        .sidebar-footer { margin-top: auto; }
        .sidebar-footer a {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.7rem 0.75rem; border-radius: var(--radius);
            color: var(--text-muted); font-size: 0.85rem; transition: all var(--transition);
        }
        .sidebar-footer a:hover { color: #f87171; background: rgba(248,113,113,0.08); }

        /* MAIN */
        .main {
            flex:1; margin-left:260px; padding:1.5rem 2rem;
            transition: margin-left 0.3s ease;
        }
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 2rem; gap:1rem;
        }
        .topbar-search {
            display: flex; align-items: center; gap:0.5rem;
            background: var(--bg-input); border-radius:50px;
            padding:0.55rem 1.2rem; flex:1; max-width:400px;
            border:1px solid transparent; transition: border-color var(--transition);
        }
        .topbar-search:focus-within { border-color: var(--accent-blue); }
        .topbar-search input {
            background:none; border:none; outline:none;
            color:#fff; font-family:inherit; font-size:0.9rem; width:100%;
        }
        .topbar-search input::placeholder { color: var(--text-muted); }
        .topbar-actions { display:flex; align-items:center; gap:0.75rem; }
        .topbar-actions button {
            width:40px; height:40px; border-radius:50%; background: var(--bg-card);
            border:1px solid var(--border); color: var(--text-secondary);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition: all var(--transition); font-size:1.1rem;
        }
        .topbar-actions button:hover { color:#fff; border-color: var(--accent-blue); background: rgba(56,189,248,0.1); }
        .avatar {
            width:40px; height:40px; border-radius:50%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            display:flex; align-items:center; justify-content:center;
            font-weight:700; color:#fff; cursor:pointer;
        }
        .menu-toggle { display:none; background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer; }

        /* STATS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.25rem; margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--bg-card); border-radius: var(--radius-lg);
            padding: 1.5rem; border: 1px solid var(--border);
            position: relative; overflow: hidden;
            transition: all var(--transition); cursor: default;
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: transparent; }
        .stat-card::after {
            content: ''; position: absolute; top:-20px; right:-20px;
            width:80px; height:80px; border-radius:50%; opacity:0.2;
        }
        .stat-card.blue::after { background: var(--accent-blue); }
        .stat-card.green::after { background: var(--accent-green); }
        .stat-card.orange::after { background: var(--accent-orange); }
        .stat-card.pink::after { background: var(--accent-pink); }
        .stat-icon {
            width:42px; height:42px; border-radius:12px;
            display:flex; align-items:center; justify-content:center;
            font-size:1.2rem; margin-bottom:1rem;
        }
        .stat-card.blue .stat-icon { background:rgba(56,189,248,0.2); color:var(--accent-blue); }
        .stat-card.green .stat-icon { background:rgba(52,211,153,0.2); color:var(--accent-green); }
        .stat-card.orange .stat-icon { background:rgba(251,191,36,0.2); color:var(--accent-orange); }
        .stat-card.pink .stat-icon { background:rgba(244,114,182,0.2); color:var(--accent-pink); }
        .stat-value { font-family:'Space Grotesk', sans-serif; font-size:1.8rem; font-weight:700; margin-bottom:0.2rem; }
        .stat-label { color:var(--text-muted); font-size:0.85rem; }

        /* CONTENT GRID */
        .content-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 1.5rem; margin-bottom: 2rem;
        }
        .calendar-card, .table-card {
            background: var(--bg-card); border:1px solid var(--border);
            border-radius: var(--radius-lg); padding:1.5rem;
            transition: all var(--transition);
        }
        .calendar-card:hover, .table-card:hover {
            border-color: rgba(255,255,255,0.1); box-shadow: var(--shadow-sm);
        }
        .card-header {
            display:flex; justify-content:space-between; align-items:center;
            margin-bottom:1.25rem;
        }
        .card-header h3 { font-family:'Space Grotesk', sans-serif; font-size:1.1rem; }

        /* CALENDAR */
        .week-grid {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 0.4rem; text-align: center;
        }
        .week-day-name {
            font-size: 0.7rem; font-weight: 600; letter-spacing: 0.05em;
            text-transform: uppercase; color: var(--text-muted);
            padding-bottom: 0.5rem;
        }
        .week-day {
            aspect-ratio: 1; border-radius: var(--radius);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 600; cursor: pointer;
            background: rgba(255,255,255,0.03);
            border: 1px solid transparent; transition: all var(--transition);
            color: var(--text-secondary);
        }
        .week-day:hover {
            background: rgba(56,189,248,0.1); border-color: var(--accent-blue);
            color: #fff; transform: scale(1.05);
        }
        .week-day.today {
            background: var(--accent-blue); color: #000;
            font-weight: 700; border-color: var(--accent-blue);
        }
        .week-day.has-appointments {
            position: relative;
        }
        .week-day.has-appointments::after {
            content: ''; position: absolute; bottom: 4px;
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--accent-green);
        }
        .week-day.today.has-appointments::after { background: #000; }
        .week-day.selected {
            border-color: var(--accent-blue); background: rgba(56,189,248,0.2); color: #fff;
        }

        /* TABLE */
        .table-wrap { overflow-x: auto; }
        table { width:100%; border-collapse:collapse; font-size:0.85rem; }
        th { text-align:left; padding:0.75rem; color:var(--text-muted); font-weight:600; border-bottom:1px solid var(--border); }
        td { padding:0.75rem; border-bottom:1px solid var(--border); color:var(--text-secondary); }
        tr:hover td { background:rgba(255,255,255,0.02); }
        .status-badge {
            display:inline-block; padding:0.2rem 0.7rem; border-radius:50px;
            font-size:0.7rem; font-weight:700; letter-spacing:0.05em;
        }
        .status-confirmado { background:rgba(52,211,153,0.15); color:var(--accent-green); }
        .status-pendente { background:rgba(251,191,36,0.15); color:var(--accent-orange); }
        .status-cancelado { background:rgba(248,113,113,0.15); color:#f87171; }
        .action-btns { display:flex; gap:0.5rem; }
        .action-btns button {
            background:none; border:none; cursor:pointer; font-size:1rem;
            padding:0.25rem; border-radius:6px; transition:all var(--transition);
        }
        .action-btns .btn-confirm { color:var(--accent-green); }
        .action-btns .btn-cancel { color:#f87171; }
        .action-btns .btn-edit { color:var(--accent-blue); }
        .action-btns button:hover { background:rgba(255,255,255,0.06); transform:scale(1.15); }

        /* MODAL */
        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.6);
            z-index:200; display:flex; align-items:center; justify-content:center;
            opacity:0; pointer-events:none; transition:opacity 0.35s;
        }
        .modal-overlay.open { opacity:1; pointer-events:auto; }
        .modal {
            background: var(--bg-card); border-radius: var(--radius-lg);
            padding: 2rem; width:90%; max-width:500px;
            box-shadow: var(--shadow-lg); border:1px solid var(--border);
            transform: translateY(20px); transition: transform 0.35s;
        }
        .modal-overlay.open .modal { transform: translateY(0); }
        .modal-header {
            display:flex; justify-content:space-between; align-items:center;
            margin-bottom:1.5rem;
        }
        .modal-header h3 { font-family:'Space Grotesk', sans-serif; }
        .modal-close { background:none; border:none; color:var(--text-muted); font-size:1.3rem; cursor:pointer; transition:color var(--transition); }
        .modal-close:hover { color:#f87171; }
        .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
        .form-group { display:flex; flex-direction:column; gap:0.3rem; }
        .form-group.full { grid-column:1/-1; }
        .form-group label { font-size:0.8rem; font-weight:600; color:var(--text-secondary); letter-spacing:0.05em; text-transform:uppercase; }
        .form-group input, .form-group select {
            background: var(--bg-input); border:1px solid var(--border);
            border-radius:8px; padding:0.7rem 0.9rem; font-family:inherit;
            font-size:0.9rem; color:#fff; outline:none; transition:border-color var(--transition);
        }
        .form-group input:focus, .form-group select:focus { border-color:var(--accent-blue); }
        .form-group input::placeholder { color:var(--text-muted); }
        .btn {
            display:inline-flex; align-items:center; justify-content:center; gap:0.5rem;
            padding:0.75rem 2rem; border-radius:50px; font-weight:600;
            font-size:0.9rem; cursor:pointer; transition:all 0.3s; border:none;
        }
        .btn-primary { background:var(--accent-blue); color:#000; width:100%; }
        .btn-primary:hover { background:#7dd3fc; transform:translateY(-1px); }
        .btn-secondary { background:var(--bg-input); color:#fff; border:1px solid var(--border); }
        .btn-secondary:hover { background:#2d3a4f; }

        .empty-state { text-align:center; padding:2rem; color:var(--text-muted); }
        .empty-state i { font-size:3rem; margin-bottom:0.5rem; opacity:0.5; }

        @media (max-width:1024px) {
            .content-grid { grid-template-columns:1fr; }
        }
        @media (max-width:768px) {
            .sidebar { transform:translateX(-100%); }
            .sidebar.open { transform:translateX(0); }
            .main { margin-left:0; }
            .menu-toggle { display:block; }
            .form-grid { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand"><i class="bi bi-calendar-check-fill"></i> AgendaPro</div>
        <nav class="sidebar-nav" id="sidebarNav">
            <a href="#" class="active"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="#"><i class="bi bi-calendar3"></i> Agendamentos</a>
            <a href="#"><i class="bi bi-people-fill"></i> Clientes</a>
            <a href="#"><i class="bi bi-scissors"></i> Serviços</a>
            <a href="#"><i class="bi bi-graph-up"></i> Relatórios</a>
        </nav>
        <div class="sidebar-footer"><a href="#"><i class="bi bi-box-arrow-right"></i> Sair</a></div>
    </aside>

    <!-- MAIN -->
    <main class="main" id="mainContent">
        <div class="topbar">
            <button class="menu-toggle" id="menuToggle"><i class="bi bi-list"></i></button>
            <div class="topbar-search">
                <i class="bi bi-search" style="color:var(--text-muted);"></i>
                <input type="text" placeholder="Buscar cliente ou serviço..." id="searchInput" />
            </div>
            <div class="topbar-actions">
                <button title="Notificações"><i class="bi bi-bell-fill"></i></button>
                <button id="btnNewAppointment" title="Novo Agendamento"><i class="bi bi-plus-lg"></i></button>
                <div class="avatar" title="Admin">B</div>
            </div>
        </div>

        <!-- STATS -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card blue">
                <div class="stat-icon"><i class="bi bi-calendar-check"></i></div>
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">Total Agendamentos</div>
            </div>
            <div class="stat-card green">
                <div class="stat-icon"><i class="bi bi-check-circle"></i></div>
                <div class="stat-value" id="statConfirmed">0</div>
                <div class="stat-label">Confirmados</div>
            </div>
            <div class="stat-card orange">
                <div class="stat-icon"><i class="bi bi-clock"></i></div>
                <div class="stat-value" id="statPending">0</div>
                <div class="stat-label">Pendentes</div>
            </div>
            <div class="stat-card pink">
                <div class="stat-icon"><i class="bi bi-x-circle"></i></div>
                <div class="stat-value" id="statCancelled">0</div>
                <div class="stat-label">Cancelados</div>
            </div>
        </div>

        <!-- CALENDAR + TABLE -->
        <div class="content-grid">
            <div class="calendar-card">
                <div class="card-header">
                    <h3>📅 Calendário</h3>
                    <span style="font-size:0.85rem;color:var(--text-muted);" id="currentWeekLabel"></span>
                </div>
                <div class="week-grid" id="weekGrid">
                    <div class="week-day-name">Dom</div><div class="week-day-name">Seg</div>
                    <div class="week-day-name">Ter</div><div class="week-day-name">Qua</div>
                    <div class="week-day-name">Qui</div><div class="week-day-name">Sex</div>
                    <div class="week-day-name">Sáb</div>
                </div>
            </div>
            <div class="table-card">
                <div class="card-header">
                    <h3>📋 Agendamentos</h3>
                    <div style="display:flex;gap:0.5rem;">
                        <select id="filterStatus" style="background:var(--bg-input);color:#fff;border:1px solid var(--border);border-radius:8px;padding:0.3rem 0.75rem;font-family:inherit;font-size:0.8rem;cursor:pointer;outline:none;">
                            <option value="todos">Todos</option>
                            <option value="confirmado">Confirmados</option>
                            <option value="pendente">Pendentes</option>
                            <option value="cancelado">Cancelados</option>
                        </select>
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr><th>Cliente</th><th>Serviço</th><th>Data</th><th>Hora</th><th>Telefone</th><th>Status</th><th>Ações</th></tr>
                        </thead>
                        <tbody id="appointmentsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Novo Agendamento</h3>
                <button class="modal-close" id="modalClose"><i class="bi bi-x-lg"></i></button>
            </div>
            <form id="appointmentForm" class="form-grid">
                <input type="hidden" id="editId" value="" />
                <div class="form-group">
                    <label>Nome do Cliente</label>
                    <input type="text" id="clientName" placeholder="Nome completo" required />
                </div>
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="tel" id="clientPhone" placeholder="(11) 99999-9999" required />
                </div>
                <div class="form-group">
                    <label>Serviço</label>
                    <select id="service" required>
                        <option value="">Selecione...</option>
                        <option>Corte de Cabelo</option>
                        <option>Barba</option>
                        <option>Hot Towel Shave</option>
                        <option>Hidratação Capilar</option>
                        <option>Design de Sobrancelha</option>
                        <option>Combo Completo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Data</label>
                    <input type="date" id="appointmentDate" required />
                </div>
                <div class="form-group">
                    <label>Hora</label>
                    <input type="time" id="appointmentTime" required />
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="appointmentStatus">
                        <option value="pendente">Pendente</option>
                        <option value="confirmado">Confirmado</option>
                        <option value="cancelado">Cancelado</option>
                    </select>
                </div>
                <div class="form-group full">
                    <button type="submit" class="btn btn-primary" id="btnSubmit">Salvar Agendamento</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        /**
         * AgendaPro — Sistema de Agendamentos com tipagem JSDoc (TypeScript-ready)
         */
        class AgendaPro {
            /**
             * @param {Object} config
             */
            constructor(config) {
                this.sidebar = document.getElementById(config.sidebarId);
                this.menuToggle = document.getElementById(config.menuToggleId);
                this.mainContent = document.getElementById(config.mainContentId);
                this.statsGrid = document.getElementById(config.statsGridId);
                this.weekGrid = document.getElementById(config.weekGridId);
                this.currentWeekLabel = document.getElementById(config.currentWeekLabelId);
                this.appointmentsTableBody = document.getElementById(config.appointmentsTableBodyId);
                this.modalOverlay = document.getElementById(config.modalOverlayId);
                this.modalTitle = document.getElementById(config.modalTitleId);
                this.appointmentForm = document.getElementById(config.appointmentFormId);
                this.btnNewAppointment = document.getElementById(config.btnNewAppointmentId);
                this.filterStatus = document.getElementById(config.filterStatusId);
                this.searchInput = document.getElementById(config.searchInputId);
                this.btnSubmit = document.getElementById(config.btnSubmitId);
                this.editId = document.getElementById('editId');
                this.clientName = document.getElementById('clientName');
                this.clientPhone = document.getElementById('clientPhone');
                this.service = document.getElementById('service');
                this.appointmentDate = document.getElementById('appointmentDate');
                this.appointmentTime = document.getElementById('appointmentTime');
                this.appointmentStatus = document.getElementById('appointmentStatus');

                /** @type {{id:number, clientName:string, clientPhone:string, service:string, date:string, time:string, status:string}[]} */
                this.appointments = [
                    { id:1, clientName:'Marina Costa', clientPhone:'(11) 98765-4321', service:'Corte de Cabelo', date:'2026-07-21', time:'14:00', status:'confirmado' },
                    { id:2, clientName:'Lucas Almeida', clientPhone:'(11) 91234-5678', service:'Barba', date:'2026-07-21', time:'15:30', status:'pendente' },
                    { id:3, clientName:'Pedro Rocha', clientPhone:'(21) 99876-5432', service:'Combo Completo', date:'2026-07-22', time:'10:00', status:'confirmado' },
                    { id:4, clientName:'Carla Mendes', clientPhone:'(31) 94567-8901', service:'Design de Sobrancelha', date:'2026-07-23', time:'11:30', status:'pendente' },
                    { id:5, clientName:'Rafael Torres', clientPhone:'(41) 93456-7890', service:'Hot Towel Shave', date:'2026-07-24', time:'16:00', status:'cancelado' },
                ];
                this.nextId = 6;
                this.selectedDate = null;
                this.currentWeekStart = this.getMonday(new Date());
                this.init();
            }

            init() {
                this.bindMobileMenu();
                this.bindModalToggle();
                this.bindFormSubmit();
                this.bindWeekCalendar();
                this.bindTableActions();
                this.bindFilter();
                this.bindSearch();
                this.renderAll();
            }

            /** @param {Date} d */
            getMonday(d) { const dt = new Date(d); dt.setDate(dt.getDate() - dt.getDay() + 1); return dt; }
            /** @param {Date} d */
            formatDate(d) { return d.toISOString().split('T')[0]; }
            /** @param {Date} d */
            formatWeekLabel(d) {
                const end = new Date(d); end.setDate(end.getDate() + 6);
                const opt = { day:'numeric', month:'short' };
                return `${d.toLocaleDateString('pt-BR',opt)} — ${end.toLocaleDateString('pt-BR',opt)}`;
            }

            bindMobileMenu() {
                this.menuToggle?.addEventListener('click', () => this.sidebar?.classList.toggle('open'));
                this.mainContent?.addEventListener('click', () => {
                    if (window.innerWidth <= 768 && this.sidebar?.classList.contains('open'))
                        this.sidebar.classList.remove('open');
                });
            }

            bindModalToggle() {
                this.btnNewAppointment?.addEventListener('click', () => this.openModal());
                document.getElementById('modalClose')?.addEventListener('click', () => this.closeModal());
                this.modalOverlay?.addEventListener('click', (e) => {
                    if (e.target === this.modalOverlay) this.closeModal();
                });
            }

            openModal(appointment = null) {
                if (this.modalTitle) this.modalTitle.textContent = appointment ? 'Editar Agendamento' : 'Novo Agendamento';
                if (this.editId) this.editId.value = appointment ? appointment.id.toString() : '';
                if (this.clientName) this.clientName.value = appointment ? appointment.clientName : '';
                if (this.clientPhone) this.clientPhone.value = appointment ? appointment.clientPhone : '';
                if (this.service) this.service.value = appointment ? appointment.service : '';
                if (this.appointmentDate) this.appointmentDate.value = appointment ? appointment.date : this.formatDate(new Date());
                if (this.appointmentTime) this.appointmentTime.value = appointment ? appointment.time : '09:00';
                if (this.appointmentStatus) this.appointmentStatus.value = appointment ? appointment.status : 'pendente';
                if (this.btnSubmit) this.btnSubmit.textContent = appointment ? 'Atualizar' : 'Salvar Agendamento';
                this.modalOverlay?.classList.add('open');
            }

            closeModal() {
                this.modalOverlay?.classList.remove('open');
                if (this.appointmentForm) this.appointmentForm.reset();
                if (this.editId) this.editId.value = '';
            }

            bindFormSubmit() {
                this.appointmentForm?.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const id = this.editId?.value;
                    const data = {
                        clientName: this.clientName?.value || '',
                        clientPhone: this.clientPhone?.value || '',
                        service: this.service?.value || '',
                        date: this.appointmentDate?.value || '',
                        time: this.appointmentTime?.value || '',
                        status: this.appointmentStatus?.value || 'pendente',
                    };
                    if (id) {
                        const idx = this.appointments.findIndex(a => a.id === parseInt(id));
                        if (idx >= 0) {
                            this.appointments[idx] = { ...this.appointments[idx], ...data };
                        }
                    } else {
                        this.appointments.push({ id: this.nextId++, ...data, status: data.status || 'pendente' });
                    }
                    this.closeModal();
                    this.renderAll();
                });
            }

            bindWeekCalendar() {
                this.renderWeekCalendar();
            }

            renderWeekCalendar() {
                if (!this.weekGrid) return;
                if (this.currentWeekLabel) {
                    this.currentWeekLabel.textContent = this.formatWeekLabel(this.currentWeekStart);
                }
                // Remove day cells (keep header)
                const existingDays = this.weekGrid.querySelectorAll('.week-day');
                existingDays.forEach(el => el.remove());

                const today = this.formatDate(new Date());
                for (let i = 0; i < 7; i++) {
                    const day = new Date(this.currentWeekStart);
                    day.setDate(day.getDate() + i);
                    const dateStr = this.formatDate(day);
                    const dayNum = day.getDate();
                    const div = document.createElement('div');
                    div.className = 'week-day';
                    div.textContent = dayNum.toString();
                    if (dateStr === today) div.classList.add('today');
                    if (dateStr === this.selectedDate) div.classList.add('selected');
                    // Check if has appointments
                    if (this.appointments.some(a => a.date === dateStr && a.status !== 'cancelado')) {
                        div.classList.add('has-appointments');
                    }
                    div.addEventListener('click', () => {
                        this.selectedDate = dateStr;
                        this.renderWeekCalendar();
                        this.renderTable();
                    });
                    this.weekGrid.appendChild(div);
                }
            }

            bindTableActions() {
                // Delegation via render
            }

            bindFilter() {
                this.filterStatus?.addEventListener('change', () => this.renderTable());
                // Navegação do calendário (setas)
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft' && !e.target.closest('input,select,textarea')) {
                        this.currentWeekStart.setDate(this.currentWeekStart.getDate() - 7);
                        this.selectedDate = null;
                        this.renderWeekCalendar();
                        this.renderTable();
                    }
                    if (e.key === 'ArrowRight' && !e.target.closest('input,select,textarea')) {
                        this.currentWeekStart.setDate(this.currentWeekStart.getDate() + 7);
                        this.selectedDate = null;
                        this.renderWeekCalendar();
                        this.renderTable();
                    }
                });
            }

            bindSearch() {
                this.searchInput?.addEventListener('input', () => this.renderTable());
            }

            /**
             * @param {number} id
             * @param {string} newStatus
             */
            updateStatus(id, newStatus) {
                const app = this.appointments.find(a => a.id === id);
                if (app) { app.status = newStatus;
                    this.renderAll(); }
            }

            /**
             * @param {number} id
             */
            deleteAppointment(id) {
                if (confirm('Tem certeza que deseja excluir este agendamento?')) {
                    this.appointments = this.appointments.filter(a => a.id !== id);
                    this.renderAll();
                }
            }

            renderAll() {
                this.renderStats();
                this.renderTable();
                this.renderWeekCalendar();
            }

            renderStats() {
                const total = this.appointments.length;
                const confirmed = this.appointments.filter(a => a.status === 'confirmado').length;
                const pending = this.appointments.filter(a => a.status === 'pendente').length;
                const cancelled = this.appointments.filter(a => a.status === 'cancelado').length;
                const statTotal = document.getElementById('statTotal');
                const statConfirmed = document.getElementById('statConfirmed');
                const statPending = document.getElementById('statPending');
                const statCancelled = document.getElementById('statCancelled');
                if (statTotal) statTotal.textContent = total.toString();
                if (statConfirmed) statConfirmed.textContent = confirmed.toString();
                if (statPending) statPending.textContent = pending.toString();
                if (statCancelled) statCancelled.textContent = cancelled.toString();
            }

            renderTable() {
                if (!this.appointmentsTableBody) return;
                const filter = this.filterStatus?.value || 'todos';
                const search = this.searchInput?.value?.toLowerCase() || '';
                let filtered = this.appointments;
                if (filter !== 'todos') filtered = filtered.filter(a => a.status === filter);
                if (this.selectedDate) filtered = filtered.filter(a => a.date === this.selectedDate);
                if (search) filtered = filtered.filter(a => a.clientName.toLowerCase().includes(search) || a.service.toLowerCase().includes(search));

                if (filtered.length === 0) {
                    this.appointmentsTableBody.innerHTML = `
                        <tr><td colspan="7" class="empty-state"><i class="bi bi-calendar-x"></i><p>Nenhum agendamento encontrado</p></td></tr>
                    `;
                    return;
                }

                const statusClass = (s) => s === 'confirmado' ? 'status-confirmado' : s === 'pendente' ? 'status-pendente' : 'status-cancelado';
                const statusLabel = (s) => s.charAt(0).toUpperCase() + s.slice(1);

                this.appointmentsTableBody.innerHTML = filtered.map(a => `
                    <tr>
                        <td><strong>${a.clientName}</strong></td>
                        <td>${a.service}</td>
                        <td>${new Date(a.date + 'T00:00').toLocaleDateString('pt-BR')}</td>
                        <td>${a.time}</td>
                        <td>${a.clientPhone}</td>
                        <td><span class="status-badge ${statusClass(a.status)}">${statusLabel(a.status)}</span></td>
                        <td>
                            <div class="action-btns">
                                ${a.status === 'pendente' ? `<button class="btn-confirm" data-action="confirm" data-id="${a.id}" title="Confirmar"><i class="bi bi-check-circle-fill"></i></button>` : ''}
                                ${a.status !== 'cancelado' ? `<button class="btn-cancel" data-action="cancel" data-id="${a.id}" title="Cancelar"><i class="bi bi-x-circle-fill"></i></button>` : ''}
                                <button class="btn-edit" data-action="edit" data-id="${a.id}" title="Editar"><i class="bi bi-pencil-fill"></i></button>
                            </div>
                        </td>
                    </tr>
                `).join('');

                // Bind actions
                this.appointmentsTableBody.querySelectorAll('button[data-action]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const action = btn.getAttribute('data-action');
                        const id = parseInt(btn.getAttribute('data-id') || '0', 10);
                        if (action === 'confirm') this.updateStatus(id, 'confirmado');
                        else if (action === 'cancel') this.updateStatus(id, 'cancelado');
                        else if (action === 'edit') {
                            const app = this.appointments.find(a => a.id === id);
                            if (app) this.openModal(app);
                        }
                    });
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new AgendaPro({
                sidebarId: 'sidebar',
                menuToggleId: 'menuToggle',
                mainContentId: 'mainContent',
                statsGridId: 'statsGrid',
                weekGridId: 'weekGrid',
                currentWeekLabelId: 'currentWeekLabel',
                appointmentsTableBodyId: 'appointmentsTableBody',
                modalOverlayId: 'modalOverlay',
                modalTitleId: 'modalTitle',
                appointmentFormId: 'appointmentForm',
                btnNewAppointmentId: 'btnNewAppointment',
                filterStatusId: 'filterStatus',
                searchInputId: 'searchInput',
                btnSubmitId: 'btnSubmit',
            });
        });
    </script>
</body>
</html>
